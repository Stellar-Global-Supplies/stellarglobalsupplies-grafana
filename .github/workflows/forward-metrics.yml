name: CloudWatch Metrics → New Relic

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write   # needed to commit metrics-state.json

jobs:
  forward-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: newrelic-metrics-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Restore metrics state from state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin state 2>/dev/null || true
          git show origin/state:metrics-state.json > metrics-state.json 2>/dev/null || echo "{}" > metrics-state.json
          ENTRIES=$(python3 -c "import json; d=json.load(open('metrics-state.json')); print(len(d))" 2>/dev/null || echo "0")
          echo "Restored metrics state: ${ENTRIES} entries"

      - name: Run metrics forwarder (CloudWatch Metrics → New Relic)
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: eu
          AWS_REGION: us-east-1
          METRICS_STATE_FILE: metrics-state.json
          METRICS_PERIOD: "300"
          BATCH_SIZE: "500"
          LOOKBACK_MINUTES: "10"
        run: python forward-metrics.py

      - name: Commit and push metrics-state.json to state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone repo fresh into temp directory to avoid conflicts
          rm -rf /tmp/repo-state
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/repo-state
          cd /tmp/repo-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout state 2>/dev/null || git checkout --orphan state
          # Copy only the state file from main workspace
          cp ${{ github.workspace }}/metrics-state.json metrics-state.json
          git add metrics-state.json
          if git diff --cached --quiet; then
            echo "metrics-state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update metrics forwarder state [skip ci]"
            git push --force origin state
          fi