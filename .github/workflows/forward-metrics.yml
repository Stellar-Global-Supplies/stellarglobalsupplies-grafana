name: CloudWatch Metrics → Splunk

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write    # needed to commit metrics-state.json

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  forward-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: splunk-metrics-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run metrics forwarder (CloudWatch Metrics → New Relic)
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: ${{ vars.NEW_RELIC_REGION }}
          METRICS_STATE_FILE: metrics-state.json
          METRICS_PERIOD: "300"
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
        run: python forward-metrics.py

      - name: Commit and push metrics-state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics-state.json
          if git diff --cached --quiet; then
            echo "metrics-state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update metrics forwarder state [skip ci]"
            git push
          fi