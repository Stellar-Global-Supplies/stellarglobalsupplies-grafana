name: CloudFront Web Traffic → New Relic

on:
  schedule:
    - cron: "0 */8 * * *"   # Every 8 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write   # needed to commit web-traffic-report.json

jobs:
  forward-web-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: web-traffic-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Process CloudFront logs and generate report
        env:
          LOGS_BUCKET: ${{ secrets.CLOUDFRONT_LOGS_BUCKET }}
          AWS_REGION: us-east-1
        run: python webtraffic_processor.py

      - name: Forward web traffic metrics to New Relic
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: eu
          WEB_TRAFFIC_REPORT: web-traffic-report.json
          BATCH_SIZE: "500"
        run: python forward-web-traffic.py

      - name: Commit and push web-traffic-report.json to state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone repo fresh into temp directory to avoid conflicts
          rm -rf /tmp/repo-state
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/repo-state
          cd /tmp/repo-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout state 2>/dev/null || git checkout --orphan state
          # Copy only the report file from main workspace
          cp ${{ github.workspace }}/web-traffic-report.json web-traffic-report.json
          git add web-traffic-report.json
          if git diff --cached --quiet; then
            echo "web-traffic-report.json unchanged — nothing to commit"
          else
            git commit -m "chore: update web traffic report [skip ci]"
            git push --force origin state
          fi