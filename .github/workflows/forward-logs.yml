name: CloudWatch Logs → New Relic

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write   # needed to commit state.json

jobs:
  forward-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: newrelic-log-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run log forwarder (CloudWatch Logs → New Relic)
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: eu
          AWS_REGION: us-east-1
          STATE_FILE: state.json
          LOG_GROUP_PREFIX: ""
          BATCH_SIZE: "500"
          LOOKBACK_HOURS: "5"
        run: python forwarder.py

      - name: Commit and push state.json to state branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clone repo fresh into temp directory to avoid conflicts
          rm -rf /tmp/repo-state
          git clone https://github.com/${{ github.repository }}.git /tmp/repo-state
          cd /tmp/repo-state
          git checkout state 2>/dev/null || git checkout --orphan state
          # Copy only the state file from main workspace
          cp ${{ github.workspace }}/state.json state.json
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update log forwarder state [skip ci]"
            git push --force origin state
          fi
