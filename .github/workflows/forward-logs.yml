name: Forward CloudWatch Logs to New Relic

on:
  schedule:
    # Every hour at :00
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  id-token: write   # needed for OIDC
  contents: write    # needed to commit state.json

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to push back

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: newrelic-log-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Run forwarder (CloudWatch Logs → New Relic)
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: ${{ vars.NEW_RELIC_REGION }}
          STATE_FILE: state.json
          LOG_GROUP_PREFIX: ${{ vars.LOG_GROUP_PREFIX }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS }}
        run: python forwarder.py

      - name: Commit and push state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update forwarder state [skip ci]"
            git push
          fi
