name: CUR Processing and Forwarding to New Relic

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write   # needed to commit cur-state.json

jobs:
  process-and-forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: cur-processor-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Process CUR data from S3
        env:
          AWS_REGION: us-east-1
          RAW_CUR_BUCKET: ${{ secrets.RAW_CUR_BUCKET || 'stellarglobal-costing-bucket' }}
        run: python cur_processor.py

      - name: Restore CUR forwarder state from state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin state 2>/dev/null || true
          git show origin/state:cur-state.json > cur-state.json 2>/dev/null || echo '{"sources":{}}' > cur-state.json
          python3 - <<'EOF'
          import json
          d = json.load(open("cur-state.json"))
          sources = d.get("sources", {})
          total_fps = sum(len(v.get("sent_points", {})) for v in sources.values())
          print(f"Restored CUR state: {len(sources)} sources, {total_fps} dedup fingerprints tracked")
          for name, v in sources.items():
              fps = len(v.get("sent_points", {}))
              last = v.get("last_successful_push", "never")
              print(f"  {name}: {fps} fingerprints, last push {last}")
          EOF

      - name: Forward CUR metrics to New Relic
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: eu
          CUR_STATE_FILE: cur-state.json
          CUR_COSTS_FILE: costs.json
          CUR_DAILY_FILE: daily-costs.json
          CUR_SUMMARY_FILE: summary.json
          CUR_TAGS_FILE: costs-by-tag.json
          CUR_USAGE_GROUP_FILE: costs-by-usage-group.json
        run: python forward_cur.py

      - name: Prune stale dedup fingerprints from cur-state.json
        # Caps sent_points at 20,000 entries per source (oldest dropped first)
        # so cur-state.json doesn't grow unbounded as months roll over.
        run: |
          python3 - <<'EOF'
          import json, os
          STATE_FILE = "cur-state.json"
          if not os.path.exists(STATE_FILE):
              exit(0)
          state = json.load(open(STATE_FILE))
          pruned_total = 0
          MAX_FP = 20_000
          for src_name, src_state in state.get("sources", {}).items():
              sent = src_state.get("sent_points")
              if not isinstance(sent, dict) or len(sent) <= MAX_FP:
                  continue
              keys    = list(sent.keys())
              to_drop = keys[:len(sent) - MAX_FP]
              for k in to_drop:
                  del sent[k]
              pruned_total += len(to_drop)
              src_state["sent_points"] = sent
          if pruned_total:
              print(f"Pruned {pruned_total} stale fingerprints from cur-state.json")
              tmp = STATE_FILE + ".tmp"
              with open(tmp, "w") as f:
                  json.dump(state, f, indent=2, sort_keys=True)
                  f.write("\n")
              os.replace(tmp, STATE_FILE)
          else:
              print("No fingerprints pruned — state within size limits")
          EOF

      - name: Clean up generated files
        if: always()
        run: |
          rm -f costs.json daily-costs.json summary.json costs-by-tag.json costs-by-usage-group.json
          echo "Cleaned up all generated JSON files"

      - name: Commit and push cur-state.json to state branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/repo-state
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/repo-state
          cd /tmp/repo-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout state 2>/dev/null || git checkout --orphan state
          cp ${{ github.workspace }}/cur-state.json cur-state.json
          git add cur-state.json
          if git diff --cached --quiet; then
            echo "cur-state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update CUR forwarder state [skip ci]"
            git push --force origin state
          fi