name: CUR Processing and Forwarding to New Relic

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write   # needed for OIDC
  contents: write   # needed to commit cur-state.json

jobs:
  process-and-forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: cur-processor-forwarder

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt

      - name: Process CUR data from S3
        env:
          AWS_REGION: us-east-1
          RAW_CUR_BUCKET: ${{ secrets.RAW_CUR_BUCKET || 'stellarglobal-costing-bucket' }}
        run: python cur_processor.py

      - name: Restore log forwarder state from state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin state 2>/dev/null || true
          git show origin/state:cur-state.json > cur-state.json 2>/dev/null || echo "{}" > cur-state.json
          ENTRIES=$(python3 -c "import json; d=json.load(open('cur-state.json')); print(len(d))" 2>/dev/null || echo "0")
          echo "Restored log state: ${ENTRIES} log groups tracked"

      - name: Forward CUR metrics to New Relic
        env:
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
          NEW_RELIC_REGION: eu
          CUR_COSTS_FILE: costs.json
          CUR_DAILY_FILE: daily-costs.json
          CUR_SUMMARY_FILE: summary.json
          CUR_TAGS_FILE: costs-by-tag.json
          CUR_USAGE_GROUP_FILE: costs-by-usage-group.json
        run: python forward_cur.py

      - name: Clean up generated files
        if: always()
        run: |
          rm -f costs.json daily-costs.json summary.json costs-by-tag.json costs-by-usage-group.json
          echo "Cleaned up all generated JSON files"

      - name: Commit and push cur-state.json to state branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone repo fresh into temp directory to avoid conflicts
          rm -rf /tmp/repo-state
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/repo-state
          cd /tmp/repo-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout state 2>/dev/null || git checkout --orphan state
          # Copy only the state file from main workspace
          cp ${{ github.workspace }}/cur-state.json cur-state.json
          git add cur-state.json
          if git diff --cached --quiet; then
            echo "cur-state.json unchanged — nothing to commit"
          else
            git commit -m "chore: update log forwarder state [skip ci]"
            git push --force origin state
          fi
